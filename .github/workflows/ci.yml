name: ci-cd
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  REGISTRY: ghcr.io
permissions:
  contents: read
  packages: write
jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: ${{ matrix.service }}
        run: npm install
      - working-directory: ${{ matrix.service }}
        run: for f in $(find src -name "*.js"); do node --check "$f"; done
  build-scan-push:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          target: runtime
          load: true
          tags: ticketing-${{ matrix.service }}:${{ github.sha }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ticketing-${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push
        if: github.event_name == 'push'
        run: |
          IMG=$(echo "ghcr.io/${{ github.repository_owner }}/ticketing-${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker tag ticketing-${{ matrix.service }}:${{ github.sha }} "$IMG:latest"
          docker push "$IMG:latest"
