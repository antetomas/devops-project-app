services:
 postgres:
  image: postgres:16-alpine
  env_file: [.env]
  environment:
   PGDATA: /var/lib/postgresql/data/pgdata
  volumes:
   - pgdata:/var/lib/postgresql/data
   - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,Z
  healthcheck:
   test: ["CMD-SHELL","pg_isready -U ticketing_user -d ticketing"]
   interval: 5s
   timeout: 5s
   retries: 10
  redis:
   image: redis:7-alpine
   command: ["redis-server","--save","","--appendonly","no"]
   healthcheck:
    test: ["CMD","redis-cli","ping"]
    interval: 5s
    timeout: 3s
    retries: 10
  api:
   build:
    context: ./api
    target: dev
   env_file: [.env]
   ports: ["8080:8080"]
   volumes: ["./api/src:/app/src"]
   depends_on:
    postgres: { condition: servise_healthy }
    redis: { condition: service_healthy }
  worker:
   build:
    context: ./worker
    target: dev
   env_file: [.env]
   volumes: ["./worker/src:/app/src"]
   depends_on:
    postgres: { condition: service_healthy }
    redis: { condition: service_healthy }
  frontend:
   build:
    context: ./frontend
    target: dev
   env_file: [.env]
   environment:
    API_BASE_URL: https://localhost:8080
   ports: ["3000:3000"]
   volumet: ["./frontend/src:/app/src"]
   depends_on: [api]
volumes:
 pgdata:
